<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Empfehlungen</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px 20px;
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
}

.hero h1 {
    font-size: 28px;
}

.hero-btn {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 20px;
    background: white;
    color: black;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}

/* CONTAINER */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

/* CARD */
.card {
    background: #1c1c1c;
    border-radius: 15px;
    width: 300px;
    margin: 15px;
    padding: 15px;
    text-align: center;
    position: relative;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.03);
}

.highlight {
    border: 2px solid #ff4b2b;
}

.badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
}

img {
    width: 100%;
    border-radius: 10px;
}

.title {
    font-size: 18px;
    margin: 10px 0;
}

.rating {
    color: gold;
}

.live {
    color: orange;
    font-size: 14px;
}

.price {
    font-size: 20px;
    margin: 10px 0;
}

.old-price {
    text-decoration: line-through;
    font-size: 14px;
    color: gray;
}

.trust {
    color: #00c853;
    font-size: 14px;
}

.button {
    display: block;
    margin-top: 10px;
    padding: 12px;
    background: #ff4b2b;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 12px;
    color: gray;
    padding: 20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>🔥 Die besten Amazon Must-Haves</h1>
    <p>Produkte die gerade viral gehen 😳</p>
    <a href="#products" class="hero-btn">Jetzt entdecken</a>
</div>

<!-- PRODUKTE -->
<div class="container" id="products">

<!-- PRODUKT 1 -->
<div class="card highlight">
    <div class="badge">🔥 VIRAL</div>

    <img src="https://m.media-amazon.com/images/I/71X9XlKQF-L._AC_SL1500_.jpg">

    <div class="title">TV Ambilight Licht 😳</div>

    <div class="rating">★★★★★ (4.8)</div>

    <div class="live">🔥 23 Leute schauen das gerade</div>

    <div class="price">89,99€ <span class="old-price">149,99€</span></div>

    <div class="trust">✔️ Über 2.000 zufriedene Käufer</div>

    <a href="DEIN-AFFILIATE-LINK" target="_blank" class="button">
        🔥 Jetzt auf Amazon ansehen
    </a>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
    *Werbung | Als Amazon-Partner verdiene ich an qualifizierten Verkäufen.
</div>

</body>
</html>
