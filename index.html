
<body>

<div class="hero">
    <h1>🔥 Die besten Amazon Must-Haves</h1>
    <p>Produkte die gerade viral gehen 😳</p>
</div>

<div class="container">

<div class="card featured">
    <div class="badge">🔥 VIRAL</div>
    <img src="https://m.media-amazon.com/images/I/81LkknBVMbL._AC_SX679_.jpg">
    <div>
        <div class="title">TV Ambilight Licht 😳</div>
        <div class="rating">★★★★★ (4.8)</div>
        <div class="live">🔥 <span id="viewer">23</span> Leute schauen das gerade</div>
        <div class="price">89,99€ <span class="old-price">149,99€</span></div>
        <a href="#" class="button">🔥 Jetzt kaufen</a>
    </div>
</div>

<div class="card"><img src="https://m.media-amazon.com/images/I/51Miz5o-NwL._AC_SL1000_.jpg"><div class="title">Fire TV Stick</div><a href="#" class="button">Jetzt ansehen</a></div>

<div class="card"><img src="https://m.media-amazon.com/images/I/71Zh0Yo0RqL._AC_SL1500_.jpg"><div class="title">Echo Dot</div><a href="#" class="button">Jetzt ansehen</a></div>

<div class="card"><img src="https://m.media-amazon.com/images/I/615Sn8Zme7L._AC_SL1001_.jpg"><div class="title">Echo Spot</div><a href="#" class="button">Jetzt ansehen</a></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup"></div>

<script>
// SCROLL ANIMATION
const cards = document.querySelectorAll(".card");
window.addEventListener("scroll", () => {
    cards.forEach(card => {
        const top = card.getBoundingClientRect().top;
        if (top < window.innerHeight - 50) {
            card.classList.add("show");
        }
    });
});

// VIEWER COUNTER
let viewer = document.getElementById("viewer");
setInterval(() => {
    let num = parseInt(viewer.innerText);
    num += Math.floor(Math.random() * 3 - 1);
    if (num < 10) num = 10;
    viewer.innerText = num;
}, 2000);

// FAKE SALES POPUP
const names = ["Max", "Lukas", "Anna", "Sophie", "Tim"];
const popup = document.getElementById("popup");

setInterval(() => {
    const name = names[Math.floor(Math.random() * names.length)];
    popup.innerText = name + " hat gerade gekauft 😳";
    popup.style.opacity = 1;

    setTimeout(() => {
        popup.style.opacity = 0;
    }, 3000);
}, 5000);
</script>

</body>
</html>
