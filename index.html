<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Empfehlungen</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px 20px;
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 20px;
}

/* CARD */
.card {
    background: #1c1c1c;
    border-radius: 15px;
    padding: 15px;
    position: relative;
    transition: 0.4s;
    opacity: 0;
    transform: translateY(30px);
}

.card.show {
    opacity: 1;
    transform: translateY(0);
}

.card:hover {
    transform: scale(1.03);
}

/* FEATURED */
.featured {
    grid-column: 1 / -1;
    display: flex;
    gap: 20px;
}

.featured img {
    width: 50%;
}

/* BADGE */
.badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
}

/* CONTENT */
img { width: 100%; border-radius: 10px; }

.title { font-size: 18px; margin: 10px 0; }

.rating { color: gold; }

.live { color: orange; font-size: 14px; }

.price { font-size: 20px; margin: 10px 0; }

.old-price {
    text-decoration: line-through;
    font-size: 14px;
    color: gray;
}

.button {
    display: block;
    margin-top: 10px;
    padding: 12px;
    background: #ff4b2b;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    text-align: center;
}

/* POPUP SALES */
.popup {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: #1c1c1c;
    padding: 10px 15px;
    border-radius: 10px;
    font-size: 14px;
    opacity: 0;
    transition: 0.5s;
}

/* MOBILE */
@media (max-width: 768px) {
    .featured {
        flex-direction: column;
    }

    .featured img {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="hero">
    <h1>🔥 Die besten Amazon Must-Haves</h1>
    <p>Produkte die gerade viral gehen 😳</p>
</div>

<div class="container">

<div class="card featured">
    <div class="badge">🔥 VIRAL</div>
    <img src="https://m.media-amazon.com/images/I/81LkknBVMbL._AC_SX679_.jpg">
    <div>
        <div class="title">TV Ambilight Licht 😳</div>
        <div class="rating">★★★★★ (4.8)</div>
        <div class="live">🔥 <span id="viewer">23</span> Leute schauen das gerade</div>
        <div class="price">89,99€ <span class="old-price">149,99€</span></div>
        <a href="#" class="button">🔥 Jetzt kaufen</a>
    </div>
</div>

<div class="card"><img src="https://m.media-amazon.com/images/I/51Miz5o-NwL._AC_SL1000_.jpg"><div class="title">Fire TV Stick</div><a href="#" class="button">Jetzt ansehen</a></div>

<div class="card"><img src="https://m.media-amazon.com/images/I/71Zh0Yo0RqL._AC_SL1500_.jpg"><div class="title">Echo Dot</div><a href="#" class="button">Jetzt ansehen</a></div>

<div class="card"><img src="https://m.media-amazon.com/images/I/615Sn8Zme7L._AC_SL1001_.jpg"><div class="title">Echo Spot</div><a href="#" class="button">Jetzt ansehen</a></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup"></div>

<script>
// SCROLL ANIMATION
const cards = document.querySelectorAll(".card");
window.addEventListener("scroll", () => {
    cards.forEach(card => {
        const top = card.getBoundingClientRect().top;
        if (top < window.innerHeight - 50) {
            card.classList.add("show");
        }
    });
});

// VIEWER COUNTER
let viewer = document.getElementById("viewer");
setInterval(() => {
    let num = parseInt(viewer.innerText);
    num += Math.floor(Math.random() * 3 - 1);
    if (num < 10) num = 10;
    viewer.innerText = num;
}, 2000);

// FAKE SALES POPUP
const names = ["Max", "Lukas", "Anna", "Sophie", "Tim"];
const popup = document.getElementById("popup");

setInterval(() => {
    const name = names[Math.floor(Math.random() * names.length)];
    popup.innerText = name + " hat gerade gekauft 😳";
    popup.style.opacity = 1;

    setTimeout(() => {
        popup.style.opacity = 0;
    }, 3000);
}, 5000);
</script>

</body>
</html>
