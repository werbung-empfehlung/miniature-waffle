<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Top Deals</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f6fa;
}

header {
    background: linear-gradient(90deg, #ff9900, #ff5500);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    position: relative;
}

.badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    color: white;
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 5px;
}

.live {
    font-size: 12px;
    color: green;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.title {
    font-size: 18px;
    margin: 10px 0;
}

.rating {
    color: gold;
}

.price {
    font-size: 22px;
    font-weight: bold;
    color: #b12704;
}

.old-price {
    text-decoration: line-through;
    color: gray;
    font-size: 14px;
}

.button {
    display: block;
    margin-top: 10px;
    padding: 12px;
    background: #ff9900;
    text-align: center;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}

.countdown {
    font-size: 12px;
    color: red;
}
</style>
</head>

<body>

<header>🔥 HEUTE BELIEBTE DEALS</header>

<div class="container">

 <div class="card">
    <div class="badge">🔥 VIRAL</div>

    <img src=81Lkkn-BVMbL._AC_SX679_

    <div class="title">TV LED Hintergrundbeleuchtung (Ambilight Effekt)</div>

    <div class="rating">★★★★★ (4.8)</div>

    <div class="live">👀 14 Leute schauen gerade</div>

    <div class="price">89,99€ <span class="old-price">149,99€</span></div>

    <div class="countdown">⏳ Nur noch heute reduziert</div>

    <a href="https://www.amazon.de/gp/aw/d/B0BD5B2T6D/?tag=https://amzn.to/4t1pONK
       target="_blank" class="button">
        Jetzt ansehen
    </a>
</div>
 



<script>
// Fake Live Besucher
setInterval(() => {
    let viewers = Math.floor(Math.random() * 20) + 5;
    document.querySelector(".live").innerText = "👀 " + viewers + " Leute schauen gerade";
}, 3000);
</script>

</body>
</html>
